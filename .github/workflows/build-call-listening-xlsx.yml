name: Build Development Coaching Tool XLSX

on:
  push:
    branches: [ main ]
    paths:
      - data/call-listening-logs.csv
      - data/coaching-tool-sync-backup.json
  workflow_dispatch:

concurrency:
  group: build-development-coaching-xlsx-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-xlsx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Validate embedded Python script syntax
        run: |
          python - <<'PY'
          import pathlib

          workflow_path = pathlib.Path('.github/workflows/build-call-listening-xlsx.yml')
          text = workflow_path.read_text(encoding='utf-8')
          start_token = "python - <<'PY'"
          end_token = "\n          PY"
          pos = 0
          block_index = 0

          while True:
            start = text.find(start_token, pos)
            if start < 0:
              break

            block_index += 1
            start = text.find('\n', start) + 1
            end = text.find(end_token, start)
            if end < 0:
              raise SystemExit(f'Could not find embedded Python heredoc end token for block {block_index}')

            block = text[start:end]
            script_lines = []
            for line in block.splitlines():
              if line.startswith('          '):
                script_lines.append(line[10:])
              else:
                script_lines.append(line)

            script = '\n'.join(script_lines)
            compile(script, f'build-call-listening-xlsx.yml:heredoc-{block_index}', 'exec')
            pos = end + len(end_token)

          if block_index == 0:
            raise SystemExit('Could not find any embedded Python heredoc blocks')

          print(f'Embedded Python syntax OK for {block_index} block(s)')
          PY

      - name: Build XLSX from CSV
        run: |
          python - <<'PY'
          import csv
          import json
          import os
          from openpyxl import Workbook


          def safe_sheet_name(name):
            return str(name or 'Sheet')[:31]


          def auto_size(ws, min_width=12, max_width=80):
            for column_cells in ws.columns:
              length = max((len(str(cell.value)) if cell.value is not None else 0) for cell in column_cells)
              ws.column_dimensions[column_cells[0].column_letter].width = min(max(length + 2, min_width), max_width)


          def write_table(wb_obj, title, headers, rows):
            sheet = wb_obj.create_sheet(title=safe_sheet_name(title))
            sheet.append(headers)

            def to_excel_value(value):
              if value is None:
                return ''
              if isinstance(value, (dict, list, tuple, set)):
                return json.dumps(value, ensure_ascii=False)
              return value

            for row in rows:
              sheet.append([to_excel_value(row.get(col, '')) for col in headers])
            auto_size(sheet)
            return sheet


          def flatten_period_data(period_data):
            period_data = period_data or {}
            employee_records = []
            metric_keys = set()

            for period_key, period in period_data.items():
              if not isinstance(period, dict):
                continue
              metadata = period.get('metadata') if isinstance(period.get('metadata'), dict) else {}
              employees = period.get('employees') if isinstance(period.get('employees'), list) else []
              for employee in employees:
                if not isinstance(employee, dict):
                  continue
                metric_keys.update(k for k in employee.keys() if k not in {'name', 'employeeId', 'id'})
                employee_records.append((period_key, metadata, employee))

            metric_columns = sorted(metric_keys)
            base_columns = ['PeriodKey', 'PeriodType', 'Label', 'StartDate', 'EndDate', 'ReviewYear', 'EmployeeName']
            headers = base_columns + metric_columns

            rows = []
            for period_key, metadata, employee in employee_records:
              row = {
                'PeriodKey': period_key,
                'PeriodType': metadata.get('periodType', ''),
                'Label': metadata.get('label', ''),
                'StartDate': metadata.get('startDate', ''),
                'EndDate': metadata.get('endDate', ''),
                'ReviewYear': metadata.get('yearEndReviewYear', ''),
                'EmployeeName': employee.get('name', '')
              }
              for key in metric_columns:
                row[key] = employee.get(key, '')
              rows.append(row)

            return headers, rows


          def flatten_object_list_map(data_map, owner_col='Owner'):
            data_map = data_map or {}
            records = []
            value_keys = set()
            for owner, entries in data_map.items():
              if isinstance(entries, dict):
                entries = [entries]
              if not isinstance(entries, list):
                continue
              for idx, entry in enumerate(entries, start=1):
                if isinstance(entry, dict):
                  value_keys.update(entry.keys())
                  records.append((owner, idx, entry))
                else:
                  records.append((owner, idx, {'Value': str(entry)}))
                  value_keys.add('Value')

            dynamic = sorted(value_keys)
            headers = [owner_col, 'Row'] + dynamic
            rows = []
            for owner, idx, entry in records:
              row = {owner_col: owner, 'Row': idx}
              for key in dynamic:
                row[key] = entry.get(key, '')
              rows.append(row)
            return headers, rows


          def flatten_scalar_map(data_map, key_col='Key'):
            data_map = data_map or {}
            metric_keys = set()
            for value in data_map.values():
              if isinstance(value, dict):
                metric_keys.update(value.keys())
            dynamic = sorted(metric_keys)
            headers = [key_col] + dynamic
            rows = []
            for key, value in data_map.items():
              row = {key_col: key}
              if isinstance(value, dict):
                for metric in dynamic:
                  row[metric] = value.get(metric, '')
              rows.append(row)
            return headers, rows


          def flatten_team_members(data_map):
            rows = []
            for period_key, members in (data_map or {}).items():
              if isinstance(members, list):
                for member in members:
                  rows.append({'PeriodKey': period_key, 'TeamMember': member})
              else:
                rows.append({'PeriodKey': period_key, 'TeamMember': str(members)})
            return ['PeriodKey', 'TeamMember'], rows


          def flatten_storage_snapshot(snapshot):
            rows = []
            for key, raw in (snapshot or {}).items():
              value_type = type(raw).__name__
              item_count = ''
              preview = ''
              parsed = raw
              if isinstance(raw, str):
                text = raw.strip()
                if text and text[0] in '{[':
                  try:
                    parsed = json.loads(raw)
                  except Exception:
                    parsed = raw

              if isinstance(parsed, dict):
                value_type = 'object'
                item_count = len(parsed)
                preview = json.dumps(parsed, ensure_ascii=False)[:350]
              elif isinstance(parsed, list):
                value_type = 'array'
                item_count = len(parsed)
                preview = json.dumps(parsed, ensure_ascii=False)[:350]
              else:
                preview = str(parsed)[:350]

              rows.append({
                'StorageKey': key,
                'ValueType': value_type,
                'ItemCount': item_count,
                'Preview': preview
              })

            return ['StorageKey', 'ValueType', 'ItemCount', 'Preview'], rows


          def flatten_pto_tracker(pto_tracker):
            def safe_float(value):
              try:
                return float(value or 0)
              except Exception:
                return 0.0

            store = pto_tracker if isinstance(pto_tracker, dict) else {}

            legacy_tracker_shape = any(k in store for k in ['entries', 'carriedOverHours', 'earnedThisYearHours', 'reliabilityHoursAgainst', 'ptostMaxHours', 'availableHours'])
            if legacy_tracker_shape and 'associates' not in store:
              associates = {'Legacy PTO Data': store}
            else:
              associates_source = store.get('associates') if isinstance(store.get('associates'), dict) else {}
              associates = {
                str(name or '').strip(): tracker
                for name, tracker in associates_source.items()
                if str(name or '').strip()
              }

            def tracker_stats(tracker):
              tracker_obj = tracker if isinstance(tracker, dict) else {}
              entries = tracker_obj.get('entries') if isinstance(tracker_obj.get('entries'), list) else []

              carried_over = safe_float(tracker_obj.get('carriedOverHours'))
              earned_this_year = safe_float(tracker_obj.get('earnedThisYearHours'))
              reliability_hours_against = safe_float(tracker_obj.get('reliabilityHoursAgainst'))
              ptost_max = safe_float(tracker_obj.get('ptostMaxHours') or 40)

              total_ptost = 0.0
              total_planned = 0.0
              total_unplanned = 0.0
              for entry in entries:
                if isinstance(entry, dict):
                  hours = safe_float(entry.get('hours'))
                  entry_type = str(entry.get('type') or '').strip().lower()
                  if entry_type == 'ptost':
                    total_ptost += hours
                  elif entry_type == 'pto-planned':
                    total_planned += hours
                  else:
                    total_unplanned += hours

              total_pto_available = carried_over + earned_this_year
              total_pto_used = total_planned + total_unplanned
              remaining_pto = max(0.0, total_pto_available - total_pto_used)
              ptost_remaining = max(0.0, ptost_max - total_ptost)
              effective_unplanned_reliability = max(total_unplanned, reliability_hours_against)
              policy_triggered = effective_unplanned_reliability > 16
              status = 'Attendance policy active (>16h PTO unplanned)' if policy_triggered else 'Attendance policy not triggered (<=16h PTO unplanned)'

              return {
                'CarriedOverHours': round(carried_over, 2),
                'EarnedThisYearHours': round(earned_this_year, 2),
                'TotalPtoAvailableHours': round(total_pto_available, 2),
                'PtoPlannedHours': round(total_planned, 2),
                'PtoUnplannedHours': round(total_unplanned, 2),
                'TotalPtoUsedHours': round(total_pto_used, 2),
                'RemainingPtoHours': round(remaining_pto, 2),
                'PtostUsedHours': round(total_ptost, 2),
                'PtostMaxHours': round(ptost_max, 2),
                'PtostRemainingHours': round(ptost_remaining, 2),
                'ReliabilityHoursAgainst': round(reliability_hours_against, 2),
                'EffectiveUnplannedReliabilityHours': round(effective_unplanned_reliability, 2),
                'AttendancePolicyThresholdHours': 16,
                'AttendancePolicyTriggered': 'Yes' if policy_triggered else 'No',
                'EntryCount': len(entries),
                'Status': status,
                'Entries': entries
              }

            summary_headers = [
              'Associate',
              'CarriedOverHours',
              'EarnedThisYearHours',
              'TotalPtoAvailableHours',
              'PtoPlannedHours',
              'PtoUnplannedHours',
              'TotalPtoUsedHours',
              'RemainingPtoHours',
              'PtostUsedHours',
              'PtostMaxHours',
              'PtostRemainingHours',
              'ReliabilityHoursAgainst',
              'EffectiveUnplannedReliabilityHours',
              'AttendancePolicyThresholdHours',
              'AttendancePolicyTriggered',
              'EntryCount',
              'Status'
            ]

            summary_rows = []
            entry_headers = ['Associate', 'Date', 'Hours', 'Type', 'Notes', 'EntryId']
            entry_rows = []

            for associate_name in sorted(associates.keys()):
              stats = tracker_stats(associates[associate_name])
              summary_rows.append({
                'Associate': associate_name,
                'CarriedOverHours': stats['CarriedOverHours'],
                'EarnedThisYearHours': stats['EarnedThisYearHours'],
                'TotalPtoAvailableHours': stats['TotalPtoAvailableHours'],
                'PtoPlannedHours': stats['PtoPlannedHours'],
                'PtoUnplannedHours': stats['PtoUnplannedHours'],
                'TotalPtoUsedHours': stats['TotalPtoUsedHours'],
                'RemainingPtoHours': stats['RemainingPtoHours'],
                'PtostUsedHours': stats['PtostUsedHours'],
                'PtostMaxHours': stats['PtostMaxHours'],
                'PtostRemainingHours': stats['PtostRemainingHours'],
                'ReliabilityHoursAgainst': stats['ReliabilityHoursAgainst'],
                'EffectiveUnplannedReliabilityHours': stats['EffectiveUnplannedReliabilityHours'],
                'AttendancePolicyThresholdHours': stats['AttendancePolicyThresholdHours'],
                'AttendancePolicyTriggered': stats['AttendancePolicyTriggered'],
                'EntryCount': stats['EntryCount'],
                'Status': stats['Status']
              })

              for entry in stats['Entries']:
                if not isinstance(entry, dict):
                  continue
                entry_rows.append({
                  'Associate': associate_name,
                  'Date': entry.get('date', ''),
                  'Hours': entry.get('hours', ''),
                  'Type': entry.get('type', ''),
                  'Notes': entry.get('notes', entry.get('reason', '')),
                  'EntryId': entry.get('id', '')
                })

            return summary_headers, summary_rows, entry_headers, entry_rows


          csv_path = 'data/call-listening-logs.csv'
          xlsx_path = 'data/call-listening-logs.xlsx'

          if not os.path.exists(csv_path):
              raise SystemExit('CSV not found: data/call-listening-logs.csv')

          wb = Workbook()
          ws = wb.active
          ws.title = 'Call Listening Logs'

          with open(csv_path, newline='', encoding='utf-8') as f:
              reader = csv.reader(f)
              for row in reader:
                  ws.append(row)

          for column_cells in ws.columns:
              length = max((len(str(cell.value)) if cell.value is not None else 0) for cell in column_cells)
              ws.column_dimensions[column_cells[0].column_letter].width = min(max(length + 2, 12), 60)

          wb.save(xlsx_path)
          print(f'Built {xlsx_path}')

          full_json_path = 'data/coaching-tool-sync-backup.json'
          full_xlsx_path = 'data/Development-Coaching-Tool.xlsx'
          payload = None
          if os.path.exists(full_json_path):
              try:
                  with open(full_json_path, encoding='utf-8') as f:
                      payload = json.load(f)
              except Exception as exc:
                  print(f'Skipping {full_xlsx_path}: unable to parse {full_json_path}: {exc}')

          if isinstance(payload, dict):

              full_wb = Workbook()
              overview = full_wb.active
              overview.title = 'Overview'
              overview.append(['Field', 'Value'])
              overview.append(['generatedAt', str(payload.get('generatedAt', ''))])
              overview.append(['reason', str(payload.get('reason', ''))])
              overview.append(['sourceAppVersion', str(payload.get('sourceAppVersion', ''))])

              weekly_headers, weekly_rows = flatten_period_data(payload.get('weeklyData'))
              ytd_headers, ytd_rows = flatten_period_data(payload.get('ytdData'))
              coaching_headers, coaching_rows = flatten_object_list_map(payload.get('coachingHistory'), owner_col='Employee')
              call_headers, call_rows = flatten_object_list_map(payload.get('callListeningLogs'), owner_col='Employee')
              avg_headers, avg_rows = flatten_scalar_map(payload.get('callCenterAverages'), key_col='PeriodKey')
              team_headers, team_rows = flatten_team_members(payload.get('myTeamMembers'))
              goals_headers, goals_rows = flatten_scalar_map(payload.get('yearEndAnnualGoalsStore'), key_col='StateKey')
              draft_headers, draft_rows = flatten_scalar_map(payload.get('yearEndDraftStore'), key_col='StateKey')
              snapshot_headers, snapshot_rows = flatten_storage_snapshot(payload.get('appStorageSnapshot'))

              overview.append(['weeklyData employee rows', len(weekly_rows)])
              overview.append(['ytdData employee rows', len(ytd_rows)])
              overview.append(['coachingHistory rows', len(coaching_rows)])
              overview.append(['callListeningLogs rows', len(call_rows)])
              overview.append(['team member rows', len(team_rows)])
              overview.append(['appStorageSnapshot keys', len(snapshot_rows)])

              write_table(full_wb, 'WeeklyData', weekly_headers, weekly_rows)
              write_table(full_wb, 'YTDData', ytd_headers, ytd_rows)
              write_table(full_wb, 'CoachingHistory', coaching_headers, coaching_rows)
              write_table(full_wb, 'CallListening', call_headers, call_rows)
              write_table(full_wb, 'CallCenterAverages', avg_headers, avg_rows)
              write_table(full_wb, 'TeamMembers', team_headers, team_rows)
              write_table(full_wb, 'YearEndGoals', goals_headers, goals_rows)
              write_table(full_wb, 'YearEndDrafts', draft_headers, draft_rows)
              write_table(full_wb, 'AppStorage', snapshot_headers, snapshot_rows)

              sentiment_sheet = full_wb.create_sheet(title='SentimentDB')
              sentiment_sheet.append(['JSON'])
              sentiment_raw = json.dumps(payload.get('sentimentPhraseDatabase', {}), ensure_ascii=False)
              sentiment_sheet.append([sentiment_raw])
              sentiment_sheet.column_dimensions['A'].width = 120

              raw_sheet = full_wb.create_sheet(title='RawBackupJSON')
              raw_sheet.append(['JSON'])
              raw_sheet.append([json.dumps(payload, ensure_ascii=False)])
              raw_sheet.column_dimensions['A'].width = 140

              auto_size(overview, min_width=18, max_width=60)
              full_wb.save(full_xlsx_path)
              print(f'Built {full_xlsx_path}')

                pto_xlsx_path = 'data/PTO-Tracking.xlsx'
                pto_wb = Workbook()
                pto_summary_headers, pto_summary_rows, pto_entry_headers, pto_entry_rows = flatten_pto_tracker(payload.get('ptoTracker'))

                pto_summary_sheet = pto_wb.active
                pto_summary_sheet.title = 'PTO Summary'
                pto_summary_sheet.append(pto_summary_headers)
                for row in pto_summary_rows:
                  pto_summary_sheet.append([row.get(col, '') for col in pto_summary_headers])
                auto_size(pto_summary_sheet, min_width=18, max_width=60)

                write_table(pto_wb, 'PTO Entries', pto_entry_headers, pto_entry_rows)
                pto_wb.save(pto_xlsx_path)
                print(f'Built {pto_xlsx_path}')
          else:
              print(f'Skipped {full_xlsx_path}: backup payload unavailable or invalid')
          PY

      - name: Commit XLSX if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f --ignore-unmatch data/coaching-tool-sync-backup.xlsx
          git add --all -- data/call-listening-logs.xlsx data/Development-Coaching-Tool.xlsx data/PTO-Tracking.xlsx
          if git diff --cached --quiet; then
            echo "No XLSX changes to commit"
          else
            git commit -m "chore(data): regenerate development coaching xlsx"
            git push
          fi
